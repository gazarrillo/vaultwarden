name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync deploy config to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: "~/quoota-vault-deploy"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/quoota-vault-deploy

            # Pull latest quoota-vault image
            docker compose pull

            # Restart with zero manual downtime (compose handles it)
            docker compose up -d

            # Remove old images
            docker image prune -f

      - name: Verify healthy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sleep 5
            docker inspect --format='{{.State.Health.Status}}' quoota-vault | grep -q healthy || \
              (echo "Container unhealthy after deploy" && exit 1)
